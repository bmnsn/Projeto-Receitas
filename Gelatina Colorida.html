<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gelatina Colorida</title>
    <link rel="stylesheet" href="Gelatina Colorida.css">
    <link href="https://fonts.googleapis.com/css2?family=Winter+Draw&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Cabeçalho -->
    <header class="topo">
        <h1>Gelatina Colorida</h1>
        <p>Aprenda essa receita deliciosa</p>
    </header>


    <!-- Retângulo principal -->
    <main class="container">

        <h2 class="titulo-receita">Receita</h2>
        <button class="btn-favorito" onclick="adicionarFavorito()">😍 Adicionar aos Favoritos</button>
        <div class="listas">

            <!-- Ingredientes -->
            <section class="box">
                <h3>Ingredientes</h3>
                <ul>
                    <li>Gelatinas de sabores</li>
                    <li>1 lata de leite condensado</li>
                    <li>1 caixa de creme de leite</li>
                </ul>
            </section>

            <!-- Preparo -->
            <section class="box">
                <h3>Modo de Preparo</h3>
                <ol>
                    <li>Prepare as gelatinas</li>
                    <li>Corte em cubos</li>
                    <li>Misture junto com a mistura dos cremes</li>
                </ol>
            </section>

        </div>

    </main>
    <script src="favoritos.js"></script>
</body>
</html>
