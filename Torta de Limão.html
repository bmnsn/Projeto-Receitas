<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Torta de Limão</title>
    <link rel="stylesheet" href="Torta de Limão.css">
    <link href="https://fonts.googleapis.com/css2?family=Winter+Draw&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Cabeçalho -->
    <header class="topo">
        <h1>Torta de Limão</h1>
        <p>Aprenda essa receita deliciosa</p>
    </header>


    <!-- Retângulo principal -->
    <main class="container">

        <h2 class="titulo-receita">Receita</h2>

        <div class="listas">

            <!-- Ingredientes -->
            <section class="box">
                <h3>Ingredientes</h3>
                <ul>
                    <li>Biscoito triturado</li>
                    <li>1 colher de manteiga</li>
                    <li>1 lata de leite condensado</li>
                    <li>1 caixa de creme de leite</li>
                    <li>3 limões</li>   
                </ul>
            </section>

            <!-- Preparo -->
            <section class="box">
                <h3>Modo de Preparo</h3>
                <ol>
                    <li>Faça base com biscoito com manteiga</li>
                    <li>Misture o recheio</li>
                    <li>Geladeira por 3h</li>
                </ol>
            </section>

        </div>

    </main>

</body>
</html>
