<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Omelete Simples</title>
    <link rel="stylesheet" href="Omelete_Simples.css">
    <link href="https://fonts.googleapis.com/css2?family=Winter+Draw&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Cabeçalho -->
    <header class="topo">
        <h1>Omelete Simples</h1>
        <p>Aprenda essa receita deliciosa</p>
    </header>


    <!-- Retângulo principal -->
    <main class="container">

        <h2 class="titulo-receita">Receita</h2>
        <button class="btn-favorito" onclick="adicionarFavorito()">😍 Adicionar aos Favoritos</button>
        <div class="listas">

            <!-- Ingredientes -->
            <section class="box">
                <h3>Ingredientes</h3>
                <ul>
                    <li>3 ovos</li>
                    <li>Sal</li>
                    <li>Queijo</li>
                    <li>Presunto</li>
                    <li>Óleo</li>
                </ul>
            </section>

            <!-- Preparo -->
            <section class="box">
                <h3>Modo de Preparo</h3>
                <ol>
                    <li>Bata os ovos com sal</li>
                    <li>Aqueça a frigideira</li>
                    <li>Adicione ovos e recheio</li>
                    <li>Dobre e cozinhe</li>
                </ol>
            </section>

        </div>

    </main>
    <script src="favoritos.js"></script>
</body>
</html>
