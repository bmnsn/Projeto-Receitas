<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Frango Grelhado com Arroz</title>
    <link rel="stylesheet" href="Frango_Grelhado_com_Arroz.css">
    <link href="https://fonts.googleapis.com/css2?family=Winter+Draw&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Cabeçalho -->
    <header class="topo">
        <h1>Frango Grelhado com Arroz</h1>
        <p>Aprenda essa receita deliciosa</p>
    </header>


    <!-- Retângulo principal -->
    <main class="container">

        <h2 class="titulo-receita">Receita</h2>
        <button class="btn-favorito" onclick="adicionarFavorito()">😍 Adicionar aos Favoritos</button>
        <div class="listas">

            <!-- Ingredientes -->
            <section class="box">
                <h3>Ingredientes</h3>
                <ul>
                    <li>2 peitos de frango</li>
                    <li>2 xícaras de arroz</li>
                    <li>4 xícaras de água</li>
                    <li>Alho, sal, óleo</li>
                </ul>
            </section>

            <!-- Preparo -->
            <section class="box">
                <h3>Modo de Preparo</h3>
                <ol>
                    <li>Tempere o frango</li>
                    <li>Grelhe até dourar</li>
                    <li>Refogue o alho, adicione arroz e água</li>
                    <li>Cozinhar até secar</li>
                </ol>
            </section>

        </div>

    </main>
    <script src="favoritos.js"></script>
</body>
</html>
