<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Panquecas</title>
    <link rel="stylesheet" href="Panquecas.css">
    <link href="https://fonts.googleapis.com/css2?family=Winter+Draw&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Cabeçalho -->
    <header class="topo">
        <h1>Panquecas</h1>
        <p>Aprenda essa receita deliciosa</p>
    </header>


    <!-- Retângulo principal -->
    <main class="container">

        <h2 class="titulo-receita">Receita</h2>

        <div class="listas">

            <!-- Ingredientes -->
            <section class="box">
                <h3>Ingredientes</h3>
                <ul>
                    <li>1 xícara de farinha</li>
                    <li>2 xícara de eite</li>
                    <li>3 ovos</li>
                    <li>1 xícara de açúcar</li>
                    <li>Doce de leite</li>

                </ul>
            </section>

            <!-- Preparo -->
            <section class="box">
                <h3>Modo de Preparo</h3>
                <ol>
                    <li>Bata tudo</li>
                    <li>Despeje porções por vez na frigideira</li>
                    <li>Deixe os discos no prato</li>
                    <li>Recheie</li>
                    <li>Enrole</li>
                </ol>
            </section>

        </div>

    </main>

</body>
</html>
