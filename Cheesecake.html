<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cheesecake</title>
    <link rel="stylesheet" href="Cheescake.css">
    <link href="https://fonts.googleapis.com/css2?family=Winter+Draw&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Cabeçalho -->
    <header class="topo">
        <h1>Cheesecake</h1>
        <p>Aprenda essa receita deliciosa</p>
    </header>


    <!-- Retângulo principal -->
    <main class="container">

        <h2 class="titulo-receita">Receita</h2>

        <div class="listas">

            <!-- Ingredientes -->
            <section class="box">
                <h3>Ingredientes</h3>
                <ul>
                    <li>300g de biscoito</li>
                    <li>2 colheres de sopas de manteiga</li>
                    <li>Cream cheese</li>
                    <li>1 xícara de açúcar</li>
                    <li>3 ovos</li>
                </ul>
            </section>

            <!-- Preparo -->
            <section class="box">
                <h3>Modo de Preparo</h3>
                <ol>
                    <li>Faça a base</li>
                    <li>Bata o recheio</li>
                    <li>Asse por 40 min</li>
                    <li>Geladeira antes de servir</li>
                </ol>
            </section>

        </div>

    </main>

</body>
</html>
