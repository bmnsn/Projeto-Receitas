<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Torta de Frango</title>
    <link rel="stylesheet" href="Torta_de_Frango.css">
    <link href="https://fonts.googleapis.com/css2?family=Winter+Draw&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Cabeçalho -->
    <header class="topo">
        <h1>Torta de Frango</h1>
        <p>Aprenda essa receita deliciosa</p>
    </header>


    <!-- Retângulo principal -->
    <main class="container">

        <h2 class="titulo-receita">Receita</h2>
        <button class="btn-favorito" onclick="adicionarFavorito()">😍 Adicionar aos Favoritos</button>
        <div class="listas">

            <!-- Ingredientes -->
            <section class="box">
                <h3>Ingredientes</h3>
                <ul>
                    <li>1 molho de tomate</li>
                    <li>1 xícara de farinha</li>
                    <li>1 ovo</li>
                    <li>1 xícara de leite</li>
                    <li>Carne moída</li>
                </ul>
            </section>

            <!-- Preparo -->
            <section class="box">
                <h3>Modo de Preparo</h3>
                <ol>
                    <li>Bata a massa</li>
                    <li>Faça discos na frigideira</li>
                    <li>Recheie com carne</li>
                    <li>Enrole e cubra com molho de tomate</li>
                </ol>
            </section>

        </div>

    </main>
    <script src="favoritos.js"></script>
</body>
</html>
